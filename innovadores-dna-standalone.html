<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil del Innovador — ADN Innovador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f1117;color:#eef0f5;min-height:100vh;
  --bg:#0f1117;--card:#161b27;--card2:#1c2235;--border:#252f48;
  --acc:#e94560;--acc3:#00d4aa;
  --txt:#eef0f5;--txt2:#8b96b0;--txt3:#4a5570;
}
.wrap{padding:1.5rem 1.25rem 3rem;max-width:820px;margin:0 auto;}
.hero{text-align:center;padding:1.5rem 0 1.75rem;}
.hero-tag{display:inline-block;background:rgba(233,69,96,0.12);border:0.5px solid rgba(233,69,96,0.35);color:#e94560;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:10px;}
.hero h1{font-size:clamp(20px,4vw,30px);line-height:1.2;color:#fff;font-weight:600;}
.hero h1 em{color:#e94560;font-style:italic;}
.hero p{font-size:12px;color:#8b96b0;margin-top:8px;line-height:1.7;max-width:480px;margin-left:auto;margin-right:auto;}
.top-prog{display:flex;gap:4px;margin-bottom:1.25rem;}
.tp{flex:1;height:5px;border-radius:3px;background:#252f48;transition:background .3s;}
.tp.done{background:#00d4aa;}
.tp.act{background:#e94560;}
.dim-hdr{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;}
.dim-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.dim-name{font-size:17px;color:#fff;font-weight:600;}
.prog-mini{height:3px;background:#252f48;border-radius:2px;margin-bottom:.85rem;overflow:hidden;}
.prog-mini-fill{height:100%;border-radius:2px;transition:width .35s;}
.prog-count{font-size:11px;color:#4a5570;margin-bottom:.65rem;}
.opt-list{display:flex;flex-direction:column;gap:6px;}
.opt-card{background:#1c2235;border:0.5px solid #252f48;border-radius:9px;padding:10px 12px;transition:border-color .15s;}
.opt-card.scored{border-color:rgba(0,212,170,0.35);background:rgba(0,212,170,0.04);}
.opt-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.opt-num{font-size:10px;color:#4a5570;min-width:18px;margin-top:2px;flex-shrink:0;}
.opt-txt{font-size:12px;color:#eef0f5;line-height:1.5;flex:1;}
.lrow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.lbl{font-size:9px;color:#4a5570;}
.lbtn{width:28px;height:28px;border-radius:50%;border:0.5px solid #252f48;background:#161b27;font-size:10px;font-weight:500;color:#4a5570;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.lbtn:hover{border-color:rgba(255,255,255,.25);color:#fff;}
.nav-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center;}
.ibtn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;}
.ibtn-p{background:#e94560;color:#fff;}
.ibtn-p:hover{background:#c93a50;}
.ibtn-g{background:#1c2235;color:#eef0f5;border:0.5px solid #252f48;}
.ibtn-g:hover{border-color:rgba(255,255,255,.2);}
.ibtn-a{background:#00d4aa;color:#0a1a14;font-weight:600;}
.auto-msg{text-align:center;padding:10px;font-size:12px;color:#00d4aa;font-weight:500;margin-bottom:8px;display:none;}
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin-bottom:1rem;}
@media(max-width:480px){.mgrid{grid-template-columns:1fr;}}
.mc{background:#161b27;border:0.5px solid #252f48;border-radius:9px;padding:.8rem;}
.mc-lbl{font-size:10px;color:#4a5570;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.mc-val{font-size:20px;font-weight:600;color:#fff;}
.mc-sub{font-size:10px;color:#4a5570;margin-top:1px;}
.chart-wrap{position:relative;width:100%;height:340px;margin-bottom:1rem;}
.sec{background:#161b27;border:0.5px solid #252f48;border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.sec h3{font-size:15px;color:#fff;font-weight:600;margin-bottom:.6rem;}
.rlist{list-style:none;}
.rlist li{display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:12px;color:#8b96b0;line-height:1.55;}
.rlist li:last-child{border-bottom:none;}
.badge{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px;}
.drow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.04);}
.drow:last-child{border-bottom:none;}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drname{font-size:12px;color:#eef0f5;flex:1;}
.dbar{flex:2;height:6px;background:#252f48;border-radius:3px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:3px;}
.dnum{font-size:11px;color:#8b96b0;min-width:30px;text-align:right;}
.fade-in{animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ed-note{background:rgba(245,166,35,0.08);border:0.5px solid rgba(245,166,35,0.25);border-radius:7px;padding:8px 12px;font-size:11px;color:#f5a623;margin-bottom:.75rem;}
.ed-lbl{font-size:10px;color:#4a5570;margin-bottom:3px;display:block;}
.ed-inp{width:100%;background:#1c2235;border:0.5px solid #252f48;border-radius:6px;color:#eef0f5;font-size:11px;padding:6px 8px;margin-bottom:5px;resize:vertical;min-height:36px;font-family:inherit;}
.ed-inp:focus{outline:none;border-color:rgba(255,255,255,.25);}
.ed-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem;}
.ed-tab{padding:4px 10px;border-radius:15px;border:0.5px solid #252f48;background:#1c2235;color:#8b96b0;font-size:11px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
// ============================================================
// ZONA EDITABLE — solo modifica dentro de DIMS_CONFIG
// Mantén exactamente 10 items en cada array opts[]
// ============================================================
var DIMS_CONFIG=[
  {id:'d1',name:'Pensamiento Asociativo',short:'Asociativo',desc:'Conectar lo no relacionado',color:'#7c5cbf',emoji:'🔗',
   opts:['Conectar problemas de negocio con conceptos de disciplinas ajenas (biología, artes, etc.)','Encontrar soluciones mediante analogías de industrias diferentes','Sintetizar ideas opuestas para generar una nueva perspectiva','Identificar patrones comunes en departamentos que no suelen colaborar','Utilizar metáforas visuales para resolver problemas técnicos complejos','Fusionar tecnología con estética (ej. diseño de interfaces y tipografía)','Crear "Efectos Medici" reuniendo expertos de diversos campos','Transformar modelos fallidos de otros en oportunidades propias','Vincular necesidades globales con capacidades locales de la empresa','Generar ideas fuera de la caja combinando datos aleatorios']},
  {id:'d2',name:'Cuestionamiento',short:'Cuestionar',desc:'Desafiar el statu quo',color:'#2a9d8f',emoji:'❓',
   opts:['Preguntar "¿Por qué?" o "¿Por qué no?" ante procesos establecidos','Plantear escenarios "¿Qué pasaría si...?" para explorar fronteras','Desafiar activamente el sesgo del statu quo en reuniones clave','Mantener una relación Q/A alta (más preguntas que respuestas emitidas)','Cuestionar la necesidad de herramientas o recursos estándar','Investigar cómo funcionan las cosas hoy frente a cómo deberían ser','Preguntar "¿Qué haría que esta idea NO funcione?" para fortalecerla','Investigar la causa raíz de por qué algo se considera "no roto"','Rechazar agendas rígidas para dedicar tiempo a la indagación libre','Provocar reflexiones profundas en el equipo mediante preguntas disruptivas']},
  {id:'d3',name:'Observación',short:'Observar',desc:'Detección de insights',color:'#e76f51',emoji:'👁',
   opts:['Observar a los clientes en su entorno natural usando el producto','Visitar laboratorios o empresas líderes para ver sus procesos en vivo','Detectar gérmenes de ideas en prototipos incompletos o defectuosos','Prestar atención a detalles estéticos o de diseño que otros ignoran','Identificar frustraciones de los usuarios mediante la observación directa','Rastrear tendencias emergentes en blogs o revistas de otros sectores','Analizar minuciosamente cómo operan los proveedores o competidores','Identificar la interacción física y emocional de las personas con servicios','Documentar sistemáticamente cambios pequeños en el entorno del mercado','Buscar activamente anomalías en el comportamiento de uso de los productos']},
  {id:'d4',name:'Networking',short:'Red de ideas',desc:'Red de ideas diversas',color:'#c9a227',emoji:'🤝',
   opts:['Hablar con personas de trasfondos "salvajemente diferentes"','Consultar ideas con perfiles creativos (músicos, diseñadores, etc.)','Asistir a conferencias fuera del área de especialidad propia','Construir una red de ideas en lugar de solo una red social de recursos','Validar conceptos con personas que tienen una visión del mundo opuesta','Intercambiar conocimientos con startups innovadoras','Aprovechar conversaciones informales para detectar oportunidades de negocio','Aprender sobre los problemas de otros para hallar soluciones propias','Buscar activamente mentores de innovación fuera de la jerarquía','Participar en comunidades de práctica ajenas a la industria principal']},
  {id:'d5',name:'Experimentación',short:'Experimentar',desc:'Aprendizaje activo',color:'#3d8b6f',emoji:'🧪',
   opts:['Inscribirse en cursos o actividades totalmente nuevos (ej. caligrafía)','Viajar o vivir en culturas diferentes para ampliar la perspectiva','Desarmar productos o procesos para entender su funcionamiento interno','Construir prototipos rápidos para probar hipótesis de negocio','Realizar pruebas piloto de ideas antes de su implementación total','Asumir riesgos inteligentes para forzar el aprendizaje rápido','Aceptar errores como un costo necesario de la innovación','Buscar información novedosa mediante el método de ensayo y error','Modificar procesos personales diariamente para medir eficiencia','Explorar activamente nuevas tecnologías mediante su uso directo']}
];
// ============================================================
// FIN ZONA EDITABLE
// ============================================================

var DNA={
  d1:{strong:'Tu capacidad de conectar disciplinas dispares activa el "Efecto Medici": generas ideas en la intersección de campos que otros ven como mundos separados.',gap:'Lee 15 min diarios de un campo ajeno al tuyo y anota una analogía aplicable a tu trabajo cada día.',actions:['Lleva un "diario de analogías": registra una idea de otra industria y cómo aplicarla a tu contexto','Organiza una sesión Medici: reúne 4 personas de disciplinas distintas para atacar un problema concreto','Elige un producto fallido de otro sector y analiza cómo transformarlo en oportunidad para tu empresa']},
  d2:{strong:'Tu hábito de cuestionar genera el alto ratio Q/A que Dyer identifica como marca de los innovadores disruptivos.',gap:'Practica los "5 por qués" ante un proceso establecido cada lunes y reserva 30 min semanales de indagación libre.',actions:['Usa "¿Qué haría que esto NO funcione?" antes de cada decisión importante','Mide tu ratio Q/A: el objetivo innovador es al menos 1 pregunta por cada respuesta que emites','Desafía un proceso "sagrado" con la pregunta: ¿Seguiríamos haciendo esto si empezáramos hoy?']},
  d3:{strong:'Tu agudeza observacional te permite detectar "gérmenes de ideas" que otros ignoran, como Jobs en Xerox PARC.',gap:'Pasa 2 horas al mes observando usuarios reales con tu producto sin intervenir, solo registrar.',actions:['Agenda una "visita de campo" mensual: observa a un cliente en su entorno natural','Lleva un diario visual: fotografía 3 detalles inesperados que observes cada semana','Visita una empresa líder fuera de tu sector y documenta qué procesos podrías aplicar']},
  d4:{strong:'Tu red diversa te expone a perspectivas distintas, el combustible del "networking de ideas" según Dyer.',gap:'Esta semana ten 1 conversación con alguien de una disciplina completamente diferente a la tuya.',actions:['Asiste a 1 evento fuera de tu industria este trimestre y conecta con 3 personas nuevas','Identifica un mentor de innovación externo a tu jerarquía y agéndalo mensualmente','Únete a una comunidad de práctica ajena a tu sector durante 90 días']},
  d5:{strong:'Tu disposición al ensayo y error normaliza el riesgo, el corazón de los "riesgos inteligentes" de Dyer.',gap:'Construye un prototipo de tu próxima idea en menos de 48 horas: sin perfección, solo aprendizaje.',actions:['Define una hipótesis concreta y diseña un experimento de bajo costo para probarla en 2 semanas','Inscríbete este mes en una actividad completamente nueva para ampliar tu paleta creativa','Establece un presupuesto de errores: permite que el 10% de experimentos fallen y documenta aprendizajes']}
};
var LEV={
  'Innovador Latente':[{b:'Primer paso',c:'#e94560',t:'Elige la práctica con puntuación más baja y comprométete durante 21 días. La consistencia supera a la intensidad.'},{b:'Hábito base',c:'#7c5cbf',t:'Adopta los "5 minutos innovadores" cada mañana: una pregunta que desafíe algo que das por hecho.'},{b:'Entorno',c:'#2a9d8f',t:'Reserva 30 min semanales de "tiempo de descubrimiento" protegido, sin agenda ni interrupciones.'}],
  'Innovador Emergente':[{b:'Palanca',c:'#c9a227',t:'Lleva tu dimensión más fuerte al siguiente nivel: enseña esa habilidad a tu equipo.'},{b:'Brecha',c:'#e94560',t:'En tu dimensión más débil, implementa una acción concreta cada semana durante 8 semanas.'},{b:'Sistema',c:'#2a9d8f',t:'Crea un tablero de innovación: registra semanalmente 1 observación, 1 pregunta y 1 conexión inesperada.'}],
  'Innovador Activo':[{b:'Escala',c:'#2a9d8f',t:'Facilita talleres internos para transferir tus habilidades de descubrimiento al equipo.'},{b:'Integración',c:'#7c5cbf',t:'Combina tus 2 dimensiones más fuertes en un método propio.'},{b:'Frontera',c:'#c9a227',t:'Un 20% de mejora en tu dimensión más débil tiene más impacto que el 20% en tu fortaleza.'}],
  'Innovador Avanzado':[{b:'Liderazgo',c:'#00d4aa',t:'Diseña sistemas que hagan que estas 5 habilidades sean parte del ADN de tu organización.'},{b:'Disrupción',c:'#e94560',t:'Identifica el supuesto más arraigado de tu industria y construye un experimento para desafiarlo.'},{b:'Legado',c:'#7c5cbf',t:'Adopta la práctica de Bezos: pregunta a cada colaborador "¿Qué has inventado?" para elevar el DQ del equipo.'}]
};

var DIMS=JSON.parse(JSON.stringify(DIMS_CONFIG));
var SCR={};DIMS.forEach(function(d){SCR[d.id]={};});
var phase=1,curDim=0,edDim=0,rc=null;

function dimSc(did){return Object.keys(SCR[did]).filter(function(k){return SCR[did][k]>0;}).length;}
function dimDone(did){return dimSc(did)===10;}
function totSc(){return DIMS.reduce(function(a,d){return a+dimSc(d.id);},0);}
function allDone(){return DIMS.every(function(d){return dimDone(d.id);});}
function getAvg(did){var v=Object.values(SCR[did]).filter(function(x){return x>0;});return v.length?v.reduce(function(a,x){return a+x;},0)/v.length:0;}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setScore(did,idx,val){
  SCR[did][idx]=val;
  var d=DIMS.find(function(x){return x.id===did;});
  var card=document.getElementById('ic-'+did+'-'+idx);
  if(card){
    card.className='opt-card'+(val>0?' scored':'');
    card.querySelectorAll('.lbtn').forEach(function(b){
      var v=parseInt(b.getAttribute('data-val'));
      b.style.background=v===val?d.color:'';
      b.style.borderColor=v===val?d.color:'';
      b.style.color=v===val?'#fff':'';
    });
  }
  var f=document.getElementById('imf-'+did);if(f)f.style.width=(dimSc(did)/10*100)+'%';
  var pc=document.getElementById('ipc-'+did);if(pc)pc.textContent=dimSc(did)+'/10 ponderadas';
  updateTP();
  if(dimDone(did)){
    var ni=DIMS.findIndex(function(x){return x.id===did;})+1;
    var msg=document.getElementById('amsg');
    if(ni<DIMS.length){
      if(msg){msg.textContent='✓ Dimensión completada. Pasando a la siguiente...';msg.style.display='block';}
      setTimeout(function(){curDim=ni;render();},1100);
    } else {
      if(msg){msg.textContent='✓ ¡50 prácticas completadas! Generando tu perfil...';msg.style.display='block';}
      setTimeout(function(){phase=2;render();},1400);
    }
  }
}

function updateTP(){
  DIMS.forEach(function(d,i){
    var el=document.getElementById('tp-'+i);
    if(!el)return;
    el.className='tp'+(dimDone(d.id)?' done':curDim===i?' act':'');
    el.style.background=(!dimDone(d.id)&&curDim===i)?d.color:'';
  });
}

function getLevel(t){
  if(t>=4.2)return{level:'Innovador Avanzado',lc:'#00d4aa',lb:'rgba(0,212,170,0.15)'};
  if(t>=3.4)return{level:'Innovador Activo',lc:'#f5a623',lb:'rgba(245,166,35,0.15)'};
  if(t>=2.5)return{level:'Innovador Emergente',lc:'#7c5cbf',lb:'rgba(124,92,191,0.15)'};
  return{level:'Innovador Latente',lc:'#e94560',lb:'rgba(233,69,96,0.15)'};
}

function renderQuiz(){
  var d=DIMS[curDim];
  var sc=dimSc(d.id);
  var bars=DIMS.map(function(dim,i){
    return '<div class="tp '+(dimDone(dim.id)?'done':i===curDim?'act':'')+'" id="tp-'+i+'" style="'+(i===curDim&&!dimDone(dim.id)?'background:'+dim.color:'')+'" title="'+h(dim.short)+'"></div>';
  }).join('');
  var opts=d.opts.map(function(txt,idx){
    var sv=SCR[d.id][idx]||0;
    var lbtns=[1,2,3,4,5].map(function(v){
      return '<button class="lbtn" data-val="'+v+'" style="'+(sv===v?'background:'+d.color+';border-color:'+d.color+';color:#fff':'')+'" onclick="setScore(\''+d.id+'\','+idx+','+v+')">'+v+'</button>';
    }).join('');
    return '<div class="opt-card '+(sv>0?'scored':'')+'" id="ic-'+d.id+'-'+idx+'"><div class="opt-top"><span class="opt-num">'+(idx+1)+'.</span><span class="opt-txt">'+h(txt)+'</span></div><div class="lrow"><span class="lbl" style="margin-right:4px">Poco</span>'+lbtns+'<span class="lbl" style="margin-left:4px">Muy relevante</span></div></div>';
  }).join('');

  document.getElementById('root').innerHTML='<div class="fade-in">'
    +'<div class="hero"><div class="hero-tag">ADN del Innovador — Dyer, Gregersen & Christensen</div>'
    +'<h1>Tu <em>Perfil de Innovación</em></h1>'
    +'<p>Puntúa cada práctica del 1 al 5. Al completar las 10 de cada dimensión avanza automáticamente.</p></div>'
    +'<div class="top-prog">'+bars+'</div>'
    +'<div class="dim-hdr"><div class="dim-ico" style="background:'+d.color+'22">'+d.emoji+'</div>'
    +'<div><div class="dim-name">'+h(d.name)+'</div><div style="font-size:11px;color:#4a5570">'+h(d.desc)+' · Dimensión '+(curDim+1)+' de '+DIMS.length+'</div></div></div>'
    +'<div class="prog-mini"><div class="prog-mini-fill" id="imf-'+d.id+'" style="width:'+(sc/10*100)+'%;background:'+d.color+'"></div></div>'
    +'<div class="prog-count" id="ipc-'+d.id+'">'+sc+'/10 ponderadas</div>'
    +'<div class="auto-msg" id="amsg"></div>'
    +'<div class="opt-list">'+opts+'</div>'
    +'<div class="nav-row">'
    +(curDim>0?'<button class="ibtn ibtn-g" onclick="curDim--;render()">← Anterior</button>':'')
    +(curDim<DIMS.length-1?'<button class="ibtn ibtn-g" onclick="curDim++;render()">Saltar →</button>':'')
    +'<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'
    +'<span style="font-size:11px;color:#4a5570">'+totSc()+'/50</span>'
    +'<button class="ibtn ibtn-g" onclick="phase=3;edDim=0;render()" style="padding:7px 12px;font-size:11px">✏️ Editar preguntas</button>'
    +(allDone()?'<button class="ibtn ibtn-a" onclick="phase=2;render()">Ver perfil →</button>':'')
    +'</div></div></div>';
}

function renderResults(){
  var avgs=DIMS.map(function(d){return{d:d,av:parseFloat(getAvg(d.id).toFixed(2))};});
  var total=avgs.reduce(function(a,x){return a+x.av;},0)/DIMS.length;
  var sorted=avgs.slice().sort(function(a,b){return b.av-a.av;});
  var lev=getLevel(total);
  var dq=Math.round(total/5*100);

  var dimBars=avgs.map(function(x){return '<div class="drow"><div class="ddot" style="background:'+x.d.color+'"></div><div class="drname">'+x.d.emoji+' '+h(x.d.short)+'</div><div class="dbar"><div class="dbar-fill" style="width:'+(x.av/5*100)+'%;background:'+x.d.color+'"></div></div><div class="dnum">'+x.av.toFixed(1)+'</div></div>';}).join('');
  var str=sorted.slice(0,2).map(function(x){return '<li><span class="badge" style="background:'+x.d.color+'22;color:'+x.d.color+'">'+x.d.emoji+' '+h(x.d.short)+' '+x.av.toFixed(1)+'</span><span>'+DNA[x.d.id].strong+'</span></li>';}).join('');
  var gap=sorted.slice(-2).reverse().map(function(x){return '<li><span class="badge" style="background:rgba(233,69,96,0.12);color:#e94560">'+x.d.emoji+' '+h(x.d.short)+' '+x.av.toFixed(1)+'</span><span>'+DNA[x.d.id].gap+'</span></li>';}).join('');
  var lacts=(LEV[lev.level]||LEV['Innovador Emergente']).map(function(r){return '<li><span class="badge" style="background:'+r.c+'18;color:'+r.c+'">'+r.b+'</span><span>'+r.t+'</span></li>';}).join('');
  var dimActs=sorted.map(function(x){
    var acts=DNA[x.d.id].actions.map(function(a){return '<li style="padding:4px 0;border-bottom:none;font-size:11px"><span style="color:'+x.d.color+';margin-right:5px">→</span>'+a+'</li>';}).join('');
    return '<div style="margin-bottom:.65rem;padding-bottom:.65rem;border-bottom:0.5px solid #252f48"><div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:8px;height:8px;border-radius:50%;background:'+x.d.color+'"></div><span style="font-size:12px;font-weight:500;color:#fff">'+x.d.emoji+' '+h(x.d.name)+'</span><span style="font-size:11px;color:'+x.d.color+';margin-left:auto">'+x.av.toFixed(1)+'/5</span></div><ul class="rlist">'+acts+'</ul></div>';
  }).join('');
  var legend=DIMS.map(function(d){return '<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#8b96b0"><span style="width:8px;height:8px;border-radius:50%;background:'+d.color+';display:inline-block"></span>'+d.emoji+' '+h(d.short)+'</span>';}).join('');

  document.getElementById('root').innerHTML='<div class="fade-in">'
    +'<div class="hero"><div class="hero-tag">ADN del Innovador — Dyer, Gregersen & Christensen</div><h1>Tu <em>Perfil de Innovación</em></h1>'
    +'<div style="margin-top:8px"><span style="display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:600;background:'+lev.lb+';color:'+lev.lc+'">'+lev.level+'</span></div></div>'
    +'<div class="mgrid"><div class="mc"><div class="mc-lbl">Puntuación global</div><div class="mc-val">'+total.toFixed(2)+'<span style="font-size:13px;color:#4a5570">/5</span></div><div class="mc-sub">Promedio de 50 prácticas</div></div>'
    +'<div class="mc"><div class="mc-lbl">DQ — Discovery Quotient</div><div class="mc-val" style="color:'+lev.lc+'">'+dq+'<span style="font-size:13px;color:#4a5570">/100</span></div><div class="mc-sub">Modelo Dyer, Gregersen & Christensen</div></div></div>'
    +'<div class="sec"><h3>Gráfico radial — 50 prácticas</h3><div class="chart-wrap"><canvas id="radar"></canvas></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">'+legend+'</div></div>'
    +'<div class="sec"><h3>Puntuación por dimensión</h3>'+dimBars+'</div>'
    +'<div class="sec"><h3>🏆 Fortalezas dominantes</h3><ul class="rlist">'+str+'</ul></div>'
    +'<div class="sec"><h3>🎯 Brechas de innovación</h3><ul class="rlist">'+gap+'</ul></div>'
    +'<div class="sec"><h3>🚀 Plan de acción — <span style="color:'+lev.lc+'">'+lev.level+'</span></h3><ul class="rlist">'+lacts+'</ul></div>'
    +'<div class="sec"><h3>🔬 Acciones concretas por dimensión</h3>'+dimActs+'</div>'
    +'<div class="nav-row"><button class="ibtn ibtn-g" onclick="phase=1;curDim=0;render()">← Revisar respuestas</button>'
    +'<button class="ibtn ibtn-p" onclick="DIMS.forEach(function(d){SCR[d.id]={};});phase=1;curDim=0;render()">Reiniciar evaluación</button></div></div>';

  buildRadar(avgs);
}

function buildRadar(avgs){
  if(rc){rc.destroy();rc=null;}
  var labels=[];
  DIMS.forEach(function(d){d.opts.forEach(function(_,i){labels.push(d.emoji+(i+1));});});
  var datasets=DIMS.map(function(d,di){
    var data=new Array(DIMS.length*10).fill(null);
    d.opts.forEach(function(_,i){data[di*10+i]=SCR[d.id][i]||0;});
    return{label:d.short,data:data,backgroundColor:d.color+'18',borderColor:d.color,borderWidth:1.5,pointBackgroundColor:d.color,pointBorderColor:'transparent',pointRadius:3,spanGaps:false};
  });
  rc=new Chart(document.getElementById('radar'),{type:'radar',data:{labels:labels,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:7},color:'#3a4560',backdropColor:'transparent'},grid:{color:'rgba(255,255,255,0.05)'},angleLines:{color:'rgba(255,255,255,0.05)'},pointLabels:{font:{size:7},color:'#4a5570'}}}}});
}

function renderEditor(){
  var d=DIMS[edDim];
  var tabs=DIMS.map(function(dim,i){return '<div class="ed-tab'+(i===edDim?' active':'')+'" style="'+(i===edDim?'border-color:'+dim.color+';color:'+dim.color:'')+'" onclick="edDim='+i+';render()">'+dim.emoji+' '+h(dim.short)+'</div>';}).join('');
  var fields=d.opts.map(function(txt,idx){return '<label class="ed-lbl">Práctica '+(idx+1)+'</label><textarea class="ed-inp" id="ef-'+d.id+'-'+idx+'" rows="2">'+h(txt)+'</textarea>';}).join('');
  document.getElementById('root').innerHTML='<div class="fade-in">'
    +'<div class="hero"><div class="hero-tag">Editor de contenido</div><h1>Editar <em>preguntas</em></h1>'
    +'<p>Modifica las prácticas sin alterar el motor de análisis. Siempre exactamente 10 por dimensión.</p></div>'
    +'<div class="ed-note">⚠️ Mantén 10 prácticas por dimensión. Al guardar se reinicia la evaluación.</div>'
    +'<div class="sec"><h3>'+d.emoji+' '+h(d.name)+'</h3>'
    +'<label class="ed-lbl">Nombre de la dimensión</label><input type="text" class="ed-inp" id="edn-'+d.id+'" value="'+h(d.name)+'" style="min-height:0;padding:6px 8px"><br>'
    +'<label class="ed-lbl">Descripción</label><input type="text" class="ed-inp" id="edd-'+d.id+'" value="'+h(d.desc)+'" style="min-height:0;padding:6px 8px"><br>'
    +'<div style="border-top:0.5px solid #252f48;padding-top:.75rem;margin-top:.5rem">'+fields+'</div></div>'
    +'<div class="sec"><h3>Navegar dimensiones</h3><div class="ed-tabs">'+tabs+'</div></div>'
    +'<div class="nav-row"><button class="ibtn ibtn-g" onclick="phase=1;render()">← Volver sin guardar</button>'
    +'<button class="ibtn ibtn-a" onclick="saveEditor()">💾 Guardar y continuar</button></div></div>';
}

function saveEditor(){
  DIMS.forEach(function(d){
    var n=document.getElementById('edn-'+d.id);
    var dd=document.getElementById('edd-'+d.id);
    if(n&&n.value.trim())d.name=n.value.trim();
    if(dd&&dd.value.trim())d.desc=dd.value.trim();
    d.opts.forEach(function(_,idx){var el=document.getElementById('ef-'+d.id+'-'+idx);if(el&&el.value.trim())d.opts[idx]=el.value.trim();});
  });
  DIMS.forEach(function(d){SCR[d.id]={};});
  phase=1;curDim=0;render();
}

function render(){
  if(phase===1)renderQuiz();
  else if(phase===2)renderResults();
  else renderEditor();
}
render();
</script>
</body>
</html>
