<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Innovación — Kivsen Institute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#eef0f5;min-height:100vh;}
.wrap{padding:0 0 4rem;max-width:820px;margin:0 auto;}
.landing{padding:3rem 1.5rem 2.5rem;text-align:center;}
.kv-logo{margin-bottom:2rem;}
.kv-logo img{height:80px;width:auto;object-fit:contain;}
.landing-hook{font-size:clamp(22px,4vw,36px);font-weight:700;color:#fff;line-height:1.2;margin-bottom:1rem;}
.landing-hook em{color:#e94560;font-style:normal;}
.landing-sub{font-size:14px;color:#8b96b0;line-height:1.8;max-width:540px;margin:0 auto 2rem;}
.promise-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:600px;margin:0 auto 2rem;}
@media(max-width:500px){.promise-grid{grid-template-columns:1fr;}}
.promise-card{background:#161b27;border:0.5px solid #252f48;border-radius:10px;padding:14px 12px;text-align:left;}
.promise-icon{font-size:18px;margin-bottom:6px;}
.promise-txt{font-size:11px;color:#8b96b0;line-height:1.5;}
.promise-txt strong{color:#eef0f5;display:block;margin-bottom:3px;font-size:12px;}
.reg-form{background:#161b27;border:0.5px solid #252f48;border-radius:12px;padding:1.5rem;max-width:480px;margin:0 auto 1.5rem;text-align:left;}
.reg-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;}
.reg-sub{font-size:11px;color:#4a5570;margin-bottom:1rem;}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:480px){.reg-grid{grid-template-columns:1fr;}}
.reg-field{display:flex;flex-direction:column;gap:4px;}
.reg-field.full{grid-column:1/-1;}
.reg-label{font-size:10px;color:#4a5570;text-transform:uppercase;letter-spacing:.07em;}
.reg-input{background:#1c2235;border:0.5px solid #252f48;border-radius:7px;color:#eef0f5;font-size:13px;padding:9px 12px;font-family:inherit;transition:border-color .15s;width:100%;}
.reg-input:focus{outline:none;border-color:rgba(255,255,255,.3);}
.reg-input.error{border-color:#e94560;}
.reg-error{font-size:11px;color:#e94560;margin-top:4px;display:none;}
.reg-error.show{display:block;}
.cta-start{display:inline-block;background:#e94560;color:#fff;font-size:14px;font-weight:700;padding:14px 36px;border-radius:8px;cursor:pointer;border:none;transition:background .15s;}
.cta-start:hover{background:#c93a50;}
.cta-note{font-size:11px;color:#4a5570;margin-top:10px;}
.social-proof{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1.5rem;font-size:11px;color:#4a5570;}
.sp-dot{width:6px;height:6px;border-radius:50%;background:#00d4aa;}
.landing-edit-link{margin-top:1.5rem;}
.landing-edit-link button{background:none;border:0.5px solid #252f48;color:#4a5570;font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;}
.landing-edit-link button:hover{color:#8b96b0;}
.quiz-wrap{padding:1.5rem 1.25rem 2rem;}
.top-prog{display:flex;gap:4px;margin-bottom:1.5rem;}
.tp{flex:1;height:5px;border-radius:3px;background:#252f48;transition:background .3s;}
.tp.done{background:#00d4aa;}
.tp.act{background:#e94560;}
.dim-context{background:#161b27;border-left:3px solid #e94560;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#8b96b0;line-height:1.5;}
.dim-context strong{color:#eef0f5;display:block;margin-bottom:2px;font-size:13px;}
.dim-hdr{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;}
.dim-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.dim-name{font-size:17px;color:#fff;font-weight:600;}
.prog-mini{height:3px;background:#252f48;border-radius:2px;margin-bottom:.85rem;overflow:hidden;}
.prog-mini-fill{height:100%;border-radius:2px;transition:width .35s;}
.prog-count{font-size:11px;color:#4a5570;margin-bottom:.65rem;}
.opt-list{display:flex;flex-direction:column;gap:6px;}
.opt-card{background:#1c2235;border:0.5px solid #252f48;border-radius:9px;padding:10px 12px;transition:border-color .15s;}
.opt-card.scored{border-color:rgba(0,212,170,0.35);background:rgba(0,212,170,0.04);}
.opt-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.opt-num{font-size:10px;color:#4a5570;min-width:18px;margin-top:2px;flex-shrink:0;}
.opt-txt{font-size:12px;color:#eef0f5;line-height:1.5;flex:1;}
.lrow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.lbl{font-size:9px;color:#4a5570;}
.lbtn{width:28px;height:28px;border-radius:50%;border:0.5px solid #252f48;background:#161b27;font-size:10px;font-weight:500;color:#4a5570;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.lbtn:hover{border-color:rgba(255,255,255,.25);color:#fff;}
.nav-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;align-items:center;}
.ibtn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;text-decoration:none;}
.ibtn-p{background:#e94560;color:#fff;}
.ibtn-g{background:#1c2235;color:#eef0f5;border:0.5px solid #252f48;}
.ibtn-g:hover{border-color:rgba(255,255,255,.2);}
.ibtn-a{background:#00d4aa;color:#0a1a14;font-weight:700;}
.ibtn-pdf{background:#7c5cbf;color:#fff;font-weight:600;}
.ibtn-email{background:#2a9d8f;color:#fff;font-weight:600;}
.auto-msg{text-align:center;padding:10px;font-size:12px;color:#00d4aa;font-weight:500;margin-bottom:8px;display:none;}
.results-wrap{padding:0 1.25rem 2rem;}
.result-hero{text-align:center;padding:2.5rem 1rem 2rem;background:linear-gradient(180deg,#161b27 0%,#0f1117 100%);border-bottom:0.5px solid #252f48;margin:0 -1.25rem 1.5rem;}
.rh-tag{display:inline-block;background:rgba(233,69,96,0.12);border:0.5px solid rgba(233,69,96,0.35);color:#e94560;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:14px;}
.rh-name{font-size:13px;color:#8b96b0;margin-bottom:4px;}
.rh-perfil-label{font-size:12px;color:#4a5570;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.rh-perfil{font-size:clamp(18px,3.5vw,26px);font-weight:700;color:#fff;margin-bottom:16px;line-height:1.2;}
.rh-insight{font-size:14px;color:#b0b8cc;line-height:1.8;max-width:560px;margin:0 auto 1rem;font-style:italic;}
.level-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.05em;}
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin-bottom:1rem;}
@media(max-width:480px){.mgrid{grid-template-columns:1fr;}}
.mc{background:#161b27;border:0.5px solid #252f48;border-radius:9px;padding:.8rem;}
.mc-lbl{font-size:10px;color:#4a5570;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.mc-val{font-size:20px;font-weight:600;color:#fff;}
.mc-sub{font-size:10px;color:#4a5570;margin-top:1px;}
.narr-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;}
@media(max-width:520px){.narr-grid{grid-template-columns:1fr;}}
.narr-block{border-radius:10px;padding:1rem;}
.narr-block.problema{background:#1a1020;border:0.5px solid rgba(233,69,96,0.3);}
.narr-block.oportunidad{background:#0a1a14;border:0.5px solid rgba(0,212,170,0.3);}
.narr-block.consecuencia{background:#1a1508;border:0.5px solid rgba(201,162,39,0.3);}
.narr-block.fortaleza{background:#0e1520;border:0.5px solid rgba(124,92,191,0.3);}
.narr-icon{font-size:20px;margin-bottom:6px;}
.narr-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:6px;}
.narr-txt{font-size:12px;line-height:1.7;color:#b0b8cc;}
.chart-wrap{position:relative;width:100%;height:320px;margin-bottom:1rem;}
.sec{background:#161b27;border:0.5px solid #252f48;border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.sec h3{font-size:14px;color:#fff;font-weight:600;margin-bottom:.6rem;}
.rlist{list-style:none;}
.rlist li{display:flex;gap:7px;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.04);font-size:12px;color:#8b96b0;line-height:1.6;}
.rlist li:last-child{border-bottom:none;}
.badge{display:inline-block;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;flex-shrink:0;margin-top:2px;}
.drow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.04);}
.drow:last-child{border-bottom:none;}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drname{font-size:12px;color:#eef0f5;flex:1;}
.dbar{flex:2;height:6px;background:#252f48;border-radius:3px;overflow:hidden;}
.dbar-fill{height:100%;border-radius:3px;}
.dnum{font-size:11px;color:#8b96b0;min-width:30px;text-align:right;}
.cta-block{background:linear-gradient(135deg,#1a1020 0%,#0e1525 100%);border:0.5px solid rgba(233,69,96,0.4);border-radius:12px;padding:1.75rem 1.5rem;text-align:center;margin-bottom:1rem;}
.cta-block h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3;}
.cta-block p{font-size:13px;color:#8b96b0;line-height:1.7;margin-bottom:1.5rem;max-width:460px;margin-left:auto;margin-right:auto;}
.cta-btn-main{display:inline-block;background:#e94560;color:#fff;font-size:14px;font-weight:700;padding:14px 32px;border-radius:8px;cursor:pointer;border:none;text-decoration:none;transition:background .15s;margin-bottom:8px;}
.cta-btn-main:hover{background:#c93a50;}
.cta-urgency{font-size:11px;color:#4a5570;margin-top:10px;}
.cta-urgency span{color:#e94560;}
.radar-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;justify-content:center;}
.rl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#8b96b0;}
.rl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.fade-in{animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.editor-wrap{padding:1.5rem 1.25rem 2rem;}
.ed-note{background:rgba(245,166,35,0.08);border:0.5px solid rgba(245,166,35,0.25);border-radius:7px;padding:8px 12px;font-size:11px;color:#f5a623;margin-bottom:.75rem;}
.ed-lbl{font-size:10px;color:#4a5570;margin-bottom:3px;display:block;margin-top:8px;}
.ed-inp{width:100%;background:#1c2235;border:0.5px solid #252f48;border-radius:6px;color:#eef0f5;font-size:11px;padding:6px 8px;margin-bottom:4px;resize:vertical;min-height:36px;font-family:inherit;}
.ed-inp:focus{outline:none;border-color:rgba(255,255,255,.25);}
.ed-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem;}
.ed-tab{padding:5px 12px;border-radius:15px;border:0.5px solid #252f48;background:#1c2235;color:#8b96b0;font-size:11px;cursor:pointer;}
.ed-sec{background:#161b27;border:0.5px solid #252f48;border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.ed-sec-title{font-size:13px;color:#fff;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.ed-opts-list{display:flex;flex-direction:column;gap:5px;}
.ed-opt-row{display:flex;align-items:flex-start;gap:6px;}
.ed-opt-num{font-size:10px;color:#4a5570;min-width:20px;flex-shrink:0;padding-top:8px;}
.ed-field{flex:1;background:#1c2235;border:0.5px solid #252f48;border-radius:6px;color:#eef0f5;font-size:11px;padding:6px 8px;font-family:inherit;resize:vertical;min-height:48px;}
.ed-field:focus{outline:none;border-color:rgba(255,255,255,.25);}
@media print{
  body{background:#fff!important;color:#111!important;}
  .no-print{display:none!important;}
  .wrap{max-width:100%!important;padding:0!important;}
  .results-wrap{padding:0 1rem!important;}
  .result-hero{background:#f8f9fa!important;border-bottom:1px solid #ddd!important;margin:0!important;padding:1.5rem 1rem!important;}
  .rh-tag{background:#ffe0e5!important;border-color:#e94560!important;color:#c93a50!important;}
  .rh-name,.rh-insight{color:#444!important;}
  .rh-perfil{color:#111!important;}
  .level-badge{border:1px solid currentColor!important;}
  .mc{background:#f8f9fa!important;border:1px solid #ddd!important;}
  .mc-lbl,.mc-sub{color:#666!important;}
  .mc-val{color:#111!important;}
  .narr-block{border:1px solid #ddd!important;background:#f8f9fa!important;}
  .narr-block.problema{background:#fff5f5!important;border-color:#fcc!important;}
  .narr-block.oportunidad{background:#f0fff8!important;border-color:#99ddc0!important;}
  .narr-block.consecuencia{background:#fffbf0!important;border-color:#fdd!important;}
  .narr-block.fortaleza{background:#f8f5ff!important;border-color:#c5b8e8!important;}
  .narr-label{color:#333!important;}
  .narr-txt{color:#444!important;}
  .sec{background:#f8f9fa!important;border:1px solid #ddd!important;page-break-inside:avoid;}
  .sec h3{color:#111!important;}
  .rlist li{color:#444!important;border-bottom-color:#eee!important;}
  .drow{border-bottom-color:#eee!important;}
  .drname{color:#111!important;}
  .dnum{color:#444!important;}
  .dbar{background:#eee!important;}
  .cta-block{background:#f8f9fa!important;border:2px solid #e94560!important;page-break-inside:avoid;}
  .cta-block h3{color:#111!important;}
  .cta-block p{color:#444!important;}
  .cta-urgency span{color:#c93a50!important;}
  .chart-wrap{height:260px!important;page-break-inside:avoid;}
  .radar-legend .rl-item{color:#444!important;}
  .mgrid{grid-template-columns:1fr 1fr!important;}
  .narr-grid{grid-template-columns:1fr 1fr!important;}
  .print-url{display:block!important;font-size:12px;color:#c93a50;margin-top:8px;font-weight:600;}
  .print-header{display:flex!important;align-items:center;justify-content:space-between;padding:.5rem 1rem;border-bottom:1px solid #ddd;margin-bottom:1rem;}
  .print-logo{font-size:12px;font-weight:700;letter-spacing:.1em;color:#111;}
  .print-logo span{color:#c93a50;}
  .print-date{font-size:10px;color:#666;}
}
@media screen{.print-url{display:none;}.print-header{display:none;}}

.tipologias-section{max-width:640px;margin:0 auto 2rem;text-align:left;}
.tipologias-title{font-size:15px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px;}
.tipologias-sub{font-size:12px;color:#4a5570;text-align:center;margin-bottom:1.25rem;line-height:1.6;}
.tipologias-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.tipologias-grid{grid-template-columns:1fr;}}
.tipo-card{background:#161b27;border:0.5px solid #252f48;border-radius:10px;padding:14px;text-align:left;}
.tipo-num{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:6px;letter-spacing:.05em;}
.tipo-name{font-size:13px;font-weight:600;color:#eef0f5;margin-bottom:2px;}
.tipo-alias{font-size:11px;color:#4a5570;font-style:italic;margin-bottom:6px;}
.tipo-desc{font-size:11px;color:#8b96b0;line-height:1.55;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
var DIMS_CONFIG=[
  {id:'d1',name:'Pensamiento Asociativo',short:'Asociativo',desc:'Conectar lo no relacionado',color:'#7c5cbf',emoji:'🔗',
   context:'Este bloque evalúa tu capacidad de generar ideas conectando mundos distintos. Es la habilidad cognitiva central del innovador disruptivo.',
   opts:[
    '¿Te ha pasado que una idea de un área completamente distinta te ayudó a ver las cosas de otra manera? Por ejemplo, el Velcro nació cuando el ingeniero suizo George de Mestral observó cómo unas semillas se adherían a su pantalón.',
    '¿Promueves espacios donde personas de distintas áreas, disciplinas o perfiles se reúnan a pensar juntos? Por ejemplo, lograr que ventas y operaciones colaboren y de esa mezcla surja algo que ninguno hubiera descubierto solo.',
    '¿Te resulta más fácil resolver problemas difíciles si los imaginas como si fueran una imagen o un dibujo?',
    '¿Alguna vez aprendiste de los errores o fracasos de otros para crear tu propia oportunidad? Por ejemplo, ver que un negocio no funcionó para alguien y entender cómo hacerlo mejor tú.',
    '¿Produces soluciones originales juntando información de temas que aparentemente no tienen ninguna relación entre ellas?',
    'Cuando tu empresa enfrenta un reto, ¿sueles mirar cómo lo han resuelto sectores completamente diferentes al tuyo — como hospitales, ejércitos o restaurantes — para inspirarte?',
    'Cuando algo no funciona en tu negocio, ¿eres capaz de transformar ese problema en una oportunidad que otros todavía no ven?',
    '¿Analizas tendencias de tu sector o de otros para identificar oportunidades que puedas aplicar en tu empresa u organización?'
   ]},
  {id:'d2',name:'Cuestionamiento',short:'Cuestionar',desc:'Desafiar el statu quo',color:'#2a9d8f',emoji:'❓',
   context:'Aquí analizamos tu disposición a cuestionar lo establecido. Los innovadores que más impacto generan son los que más preguntas hacen.',
   opts:[
    '¿Te atreves a preguntar "¿y por qué no lo hacemos diferente?" cuando algo no te parece lógico?',
    '¿Te preguntas "¿qué pasaría si...?" para ver más allá de lo que ya conoces?',
    '¿Eres de las personas que primero pregunta mucho antes de dar una opinión o respuesta?',
    '¿Te preguntas si hay formas más creativas o económicas de hacer algo en lugar de usar lo que siempre se usa?',
    '¿Te haces preguntas sobre el futuro de tu sector para anticiparte a cambios antes de que sean urgentes?',
    '¿Analizas los posibles errores o fallas de una idea tuya para hacerla más sólida?',
    '¿Haces preguntas que "mueven el piso" para que tu equipo salga de su zona de confort y piense diferente?',
    '¿Dejas espacio en tu día para explorar ideas sin un plan fijo, en lugar de seguir siempre una agenda estricta?'
   ]},
  {id:'d3',name:'Observación',short:'Observar',desc:'Detección de insights',color:'#e76f51',emoji:'👁',
   context:'Este bloque mide qué tan atento estás a lo que sucede a tu alrededor. Las mejores ideas no surgen de la imaginación pura: las descubren quienes saben ver lo que otros todavía no han notado.',
   opts:[
    '¿Observas a tus clientes mientras usan tu producto en situaciones reales de su vida?',
    '¿Eres capaz de encontrar el potencial de una buena idea aunque el resultado inicial sea imperfecto o incompleto?',
    '¿Eres de las personas que nota cómo está hecho o cómo luce algo, aunque nadie más le preste atención a eso?',
    '¿Exploras lo que está surgiendo en otros campos o industrias para anticiparte a tendencias antes que los demás?',
    '¿Miras con atención cómo trabajan los que están en tu mismo negocio o los que te suministran lo que necesitas?',
    '¿Notas cuando algo que siempre funcionó de cierta manera empieza a cambiar sutilmente, aunque los demás todavía no lo vean?',
    '¿Logras ver posibilidades nuevas en algo, incluso cuando ya tienes una opinión formada sobre cómo funciona o para qué sirve?',
    '¿Prestas atención a lo que tus clientes NO te dicen — sus silencios, sus dudas, sus comportamientos — tanto como a lo que sí expresan?'
   ]},
  {id:'d4',name:'Networking',short:'Red de ideas',desc:'Red de ideas diversas',color:'#c9a227',emoji:'🤝',
   context:'Evaluamos la calidad de tu red de ideas. No se trata de cuántos contactos tienes, sino de cuán distintos son los mundos que te alimentan.',
   opts:[
    '¿Buscas activamente conocer o intercambiar ideas con personas que piensan, viven o trabajan de maneras diferentes a tu realidad cotidiana?',
    '¿Participas en talleres o conferencias de temas alejados de tu especialidad para aprender cosas nuevas?',
    '¿Consultas tus proyectos o ideas con personas que tienen valores o puntos de vista muy diferentes a los tuyos?',
    '¿Aprendes de empresas emergentes o startups que están haciendo las cosas de maneras creativas y distintas?',
    '¿Estás atento a las conversaciones casuales del día a día para descubrir posibles oportunidades de negocio?',
    '¿Te acercas a personas innovadoras fuera de tu estructura de trabajo para aprender de su experiencia o solicitar consejo e inspiración?',
    '¿Buscas conectar a personas de tu red entre sí cuando crees que la combinación de sus ideas podría generar algo valioso?',
    '¿Compartes tus ideas en etapas tempranas — antes de que estén pulidas — para recibir perspectivas que no habías considerado?'
   ]},
  {id:'d5',name:'Experimentación',short:'Experimentar',desc:'Aprendizaje activo',color:'#3d8b6f',emoji:'🧪',
   context:'Estas preguntas analizan tu capacidad de actuar bajo incertidumbre. La velocidad con que aprendes experimentando determina qué tan lejos puedes llegar.',

var DIMS=JSON.parse(JSON.stringify(DIMS_CONFIG));
var SCR={};DIMS.forEach(function(d){SCR[d.id]={};});
var phase=0,curDim=0,edDim=0,rc=null;
var USER={nombre:'',apellido:'',email:''};

function dimSc(did){return Object.keys(SCR[did]).filter(function(k){return SCR[did][k]>0;}).length;}
function dimLen(did){return DIMS.find(function(x){return x.id===did;}).opts.length;}
function dimDone(did){return dimSc(did)===dimLen(did);}
function totSc(){return DIMS.reduce(function(a,d){return a+dimSc(d.id);},0);}
function totLen(){return DIMS.reduce(function(a,d){return a+d.opts.length;},0);}
function allDone(){return DIMS.every(function(d){return dimDone(d.id);});}
function getAvg(did){var v=Object.values(SCR[did]).filter(function(x){return x>0;});return v.length?v.reduce(function(a,x){return a+x;},0)/v.length:0;}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fullName(){return (USER.nombre+' '+USER.apellido).trim();}
function today(){
  var d=new Date();
  var m=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return d.getDate()+' de '+m[d.getMonth()]+' de '+d.getFullYear();
}
function todayShort(){var d=new Date();return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}

function setScore(did,idx,val){
  SCR[did][idx]=val;
  var d=DIMS.find(function(x){return x.id===did;});
  var card=document.getElementById('ic-'+did+'-'+idx);
  if(card){
    card.className='opt-card'+(val>0?' scored':'');
    card.querySelectorAll('.lbtn').forEach(function(b){
      var v=parseInt(b.getAttribute('data-val'));
      b.style.background=v===val?d.color:'';
      b.style.borderColor=v===val?d.color:'';
      b.style.color=v===val?'#fff':'';
    });
  }
  var f=document.getElementById('imf-'+did);if(f)f.style.width=(dimSc(did)/dimLen(did)*100)+'%';
  var pc=document.getElementById('ipc-'+did);if(pc)pc.textContent=dimSc(did)+'/'+dimLen(did)+' evaluadas';
  updateTP();
  if(dimDone(did)){
    var ni=DIMS.findIndex(function(x){return x.id===did;})+1;
    var msg=document.getElementById('amsg');
    if(ni<DIMS.length){
      if(msg){msg.textContent='✓ Bloque completado. Continuando...';msg.style.display='block';}
      setTimeout(function(){curDim=ni;render();},1100);
    } else {
      if(msg){msg.textContent='✓ Evaluación completa. Generando tu diagnóstico...';msg.style.display='block';}
      setTimeout(function(){phase=2;render();},1500);
    }
  }
}

function updateTP(){
  DIMS.forEach(function(d,i){
    var el=document.getElementById('tp-'+i);if(!el)return;
    el.className='tp'+(dimDone(d.id)?' done':curDim===i?' act':'');
    el.style.background=(!dimDone(d.id)&&curDim===i)?d.color:'';
  });
}

function getLevel(t){
  if(t>=4.2)return{level:'Innovador Avanzado',lc:'#00d4aa',lb:'rgba(0,212,170,0.15)'};
  if(t>=3.4)return{level:'Innovador Activo',lc:'#f5a623',lb:'rgba(245,166,35,0.15)'};
  if(t>=2.5)return{level:'Innovador Emergente',lc:'#7c5cbf',lb:'rgba(124,92,191,0.15)'};
  return{level:'Innovador Latente',lc:'#e94560',lb:'rgba(233,69,96,0.15)'};
}

function startDiag(){
  var n=document.getElementById('rn').value.trim();
  var a=document.getElementById('ra').value.trim();
  var e=document.getElementById('re').value.trim();
  var ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  var err=document.getElementById('reg-err');
  if(!n||!a||!ok){
    err.className='reg-error show';
    if(!n)document.getElementById('rn').className='reg-input error';
    if(!a)document.getElementById('ra').className='reg-input error';
    if(!ok)document.getElementById('re').className='reg-input error';
    return;
  }
  USER.nombre=n;USER.apellido=a;USER.email=e;
  phase=1;render();
}

function renderQuiz(){
  var d=DIMS[curDim];
  var sc=dimSc(d.id);
  var bars=DIMS.map(function(dim,i){
    return '<div class="tp '+(dimDone(dim.id)?'done':i===curDim?'act':'')+'" id="tp-'+i+'" style="'+(i===curDim&&!dimDone(dim.id)?'background:'+dim.color:'')+'" title="'+h(dim.short)+'"></div>';
  }).join('');
  var opts=d.opts.map(function(txt,idx){
    var sv=SCR[d.id][idx]||0;
    var lbtns=[1,2,3,4,5].map(function(v){
      return '<button class="lbtn" data-val="'+v+'" style="'+(sv===v?'background:'+d.color+';border-color:'+d.color+';color:#fff':'')+'" onclick="setScore(\''+d.id+'\','+idx+','+v+')">'+v+'</button>';
    }).join('');
    return '<div class="opt-card '+(sv>0?'scored':'')+'" id="ic-'+d.id+'-'+idx+'"><div class="opt-top"><span class="opt-num">'+(idx+1)+'.</span><span class="opt-txt">'+h(txt)+'</span></div><div class="lrow"><span class="lbl" style="margin-right:4px">Poco</span>'+lbtns+'<span class="lbl" style="margin-left:4px">Muy relevante</span></div></div>';
  }).join('');

  document.getElementById('root').innerHTML='<div class="fade-in"><div class="quiz-wrap">'
    +'<div style="font-size:11px;color:#4a5570;margin-bottom:1rem">Hola, <strong style="color:#eef0f5">'+h(fullName())+'</strong> — completando tu diagnóstico de innovación</div>'
    +'<div class="top-prog">'+bars+'</div>'
    +'<div class="dim-context"><strong>'+h(d.name)+' — Bloque '+(curDim+1)+' de '+DIMS.length+'</strong>'+h(d.context)+'</div>'
    +'<div class="dim-hdr"><div class="dim-ico" style="background:'+d.color+'22">'+d.emoji+'</div>'
    +'<div><div class="dim-name">'+h(d.name)+'</div>'

    +'<div class="prog-mini"><div class="prog-mini-fill" id="imf-'+d.id+'" style="width:'+(sc/dimLen(d.id)*100)+'%;background:'+d.color+'"></div></div>'
    +'<div class="prog-count" id="ipc-'+d.id+'">'+sc+'/'+dimLen(d.id)+' evaluadas</div>'
    +'<div class="auto-msg" id="amsg"></div>'
    +'<div class="opt-list">'+opts+'</div>'
    +'<div class="nav-row no-print">'

    +'</div></div></div></div>';
}

function renderResults(){

  var sorted=avgs.slice().sort(function(a,b){return b.av-a.av;});

    +'</div>'
    +'<div class="nav-row no-print" style="margin-bottom:1rem">'
    +'<button class="ibtn ibtn-pdf" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>'
    +'<a class="ibtn ibtn-email" href="'+mailtoMe+'" style="text-decoration:none">📧 Enviar a mi correo</a>'
    
    +'</div>'
    +'<div class="mgrid">'
    +'<div class="mc"><div class="mc-lbl">Puntuación global</div><div class="mc-val">'+total.toFixed(2)+'<span style="font-size:13px;color:#4a5570">/5</span></div><div class="mc-sub">Promedio de '+totLen()+' preguntas evaluadas</div></div>'
    +'<div class="mc"><div class="mc-lbl">Discovery Quotient</div><div class="mc-val" style="color:'+lev.lc+'">'+dq+'<span style="font-size:13px;color:#4a5570">/100</span></div><div class="mc-sub">Modelo Dyer, Gregersen & Christensen</div></div>'
    +'</div>'
    +'<div class="narr-grid">'
    +'<div class="narr-block problema"><div class="narr-icon">⚠️</div><div class="narr-label" style="color:#e94560">Problema clave</div><div class="narr-txt">'+h(perfil.problema)+'</div></div>'
    +'<div class="narr-block consecuencia"><div class="narr-icon">⏳</div><div class="narr-label" style="color:#c9a227">Si no actúas</div><div class="narr-txt">'+h(perfil.consecuencia)+'</div></div>'
    +'<div class="narr-block fortaleza"><div class="narr-icon">💪</div><div class="narr-label" style="color:#7c5cbf">Tu mayor fortaleza</div><div class="narr-txt">'+h(topDim.d.name)+' ('+topDim.av.toFixed(1)+'/5) — '+DNA[topDim.d.id].strong+'</div></div>'
    +'<div class="narr-block oportunidad"><div class="narr-icon">🚀</div><div class="narr-label" style="color:#00d4aa">La oportunidad</div><div class="narr-txt">'+h(perfil.oportunidad)+'</div></div>'
    +'</div>'
    +'<div class="cta-block">'
    +'<h3>'+h(KIVSEN.cta_titulo)+'</h3>'
    +'<p>'+h(KIVSEN.cta_texto)+'</p>'
    +'<div class="no-print"><a class="cta-btn-main" href="'+mailtoKivsen+'">'+h(KIVSEN.cta_btn_principal)+'</a></div>'
    +'<div class="cta-urgency"><span>⚡ '+h(KIVSEN.cta_urgencia)+'</span></div>'
    +'<div class="print-url">Para tu sesión estratégica escribe a: '+KIVSEN.cta_email+'</div>'
    +'</div>'
    +'<div class="sec"><h3>Mapa de innovación — por habilidad</h3>'
    +'<div class="chart-wrap"><canvas id="radar"></canvas></div>'
    +'<div class="radar-legend">'+radarLegend+'</div></div>'
    +'<div class="sec"><h3>Puntuación detallada por dimensión</h3>'+dimBars+'</div>'
    +'<div class="sec"><h3>🎯 Tu mayor palanca de crecimiento</h3>'
    +'<ul class="rlist"><li><span class="badge" style="background:rgba(233,69,96,0.12);color:#e94560">'+lowDim.d.emoji+' '+h(lowDim.d.short)+' '+lowDim.av.toFixed(1)+'</span>'+DNA[lowDim.d.id].gap+'</li></ul></div>'
    +'<div class="sec"><h3>🔬 Acciones concretas por dimensión</h3>'+accHtml+'</div>'
    +'<div class="cta-block" style="margin-top:.5rem">'
    +'<h3 style="font-size:16px">¿Listo para convertir este diagnóstico en resultados reales?</h3>'
    +'<p>Agenda una sesión estratégica gratuita y analicemos juntos cómo acelerar tu camino como innovador.</p>'
    +'<div class="no-print"><a class="cta-btn-main" href="'+mailtoKivsen+'">'+h(KIVSEN.cta_btn_principal)+'</a></div>'
    +'<div class="print-url">Escríbenos a: '+KIVSEN.cta_email+'</div>'
    +'</div>'
    +'<div class="nav-row no-print" style="margin-top:1rem">'
    +'<button class="ibtn ibtn-pdf" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>'
    +'<a class="ibtn ibtn-email" href="'+mailtoMe+'" style="text-decoration:none">📧 Enviar a mi correo</a>'
    +'<button class="ibtn ibtn-g" onclick="phase=1;curDim=0;render()">← Revisar</button>'
    +'<button class="ibtn ibtn-g" onclick="DIMS.forEach(function(d){SCR[d.id]={};});USER={nombre:\'\',apellido:\'\',email:\'\'};phase=0;curDim=0;render()">Reiniciar</button>'
    +'</div>'
    +'</div></div>';

  buildRadar(avgs);
}

function buildRadar(avgs){
  if(rc){rc.destroy();rc=null;}
  rc=new Chart(document.getElementById('radar'),{
    type:'radar',
    data:{
      labels:avgs.map(function(x){return x.d.emoji+' '+x.d.short;}),
      datasets:[{
        label:'Tu perfil',
        data:avgs.map(function(x){return x.av;}),
        backgroundColor:'rgba(233,69,96,0.08)',
        borderColor:'rgba(233,69,96,0.6)',
        borderWidth:2,
        pointBackgroundColor:avgs.map(function(x){return x.d.color;}),
        pointBorderColor:'#0f1117',
        pointBorderWidth:2,
        pointRadius:7,
        pointHoverRadius:9,
        fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ' '+ctx.parsed.r.toFixed(1)+' / 5';}}}},
      scales:{r:{min:0,max:5,
        ticks:{stepSize:1,font:{size:10},color:'#4a5570',backdropColor:'transparent'},
        grid:{color:'rgba(255,255,255,0.07)'},
        angleLines:{color:'rgba(255,255,255,0.1)'},
        pointLabels:{font:{size:12,weight:'600'},color:avgs.map(function(x){return x.d.color;}),padding:10}
      }}
    }
  });
}

function renderEditor(){
  var d=DIMS[edDim];
  var tabs=DIMS.map(function(dim,i){
    return '<div class="ed-tab" style="'+(i===edDim?'border-color:'+dim.color+';color:'+dim.color+';background:'+dim.color+'15':'')+'" onclick="edDim='+i+';render()">'+dim.emoji+' '+h(dim.short)+'</div>';
  }).join('');
  var fields=d.opts.map(function(txt,idx){
    return '<div class="ed-opt-row"><span class="ed-opt-num">'+(idx+1)+'.</span>'
      +'<textarea class="ed-field" id="ef-'+d.id+'-'+idx+'" rows="2">'+h(txt)+'</textarea></div>';
  }).join('');

  document.getElementById('root').innerHTML='<div class="fade-in"><div class="editor-wrap">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">'
    +'<div style="width:32px;height:32px;border-radius:8px;background:'+d.color+'22;display:flex;align-items:center;justify-content:center;font-size:15px">'+d.emoji+'</div>'
    +'<div><div style="font-size:17px;color:#fff;font-weight:600">Editor de preguntas</div>'
    +'<div style="font-size:11px;color:#4a5570">Modifica el contenido sin alterar el motor de análisis</div></div></div>'
    +'<div class="ed-note">⚠️ Al guardar se reinicia la evaluación con el nuevo contenido.</div>'
    +'<div class="ed-tabs">'+tabs+'</div>'
    +'<div class="ed-sec">'
    +'<div class="ed-sec-title"><span style="font-size:18px">'+d.emoji+'</span> '+h(d.name)+'</div>'
    +'<label class="ed-lbl" style="margin-top:0">Nombre de la dimensión</label>'
    +'<input type="text" class="ed-inp" id="edn-'+d.id+'" value="'+h(d.name)+'"><br>'
    +'<label class="ed-lbl">Micro-copy (texto de contexto durante el test)</label>'
    +'<textarea class="ed-inp" id="ectx-'+d.id+'" rows="2">'+h(d.context)+'</textarea>'
    +'<label class="ed-lbl" style="margin-top:8px;border-top:0.5px solid #252f48;padding-top:10px">Preguntas ('+d.opts.length+' en esta dimensión)</label>'
    +'<div class="ed-opts-list">'+fields+'</div>'
    +'</div>'
    +'<div class="nav-row">'
    +'<button class="ibtn ibtn-g" onclick="render_back()">← Volver sin guardar</button>'
    +'<button class="ibtn ibtn-a" onclick="saveEditor()">💾 Guardar y continuar</button>'
    +'</div></div></div>';
}

function render_back(){phase=phase<=1?phase:1;render();}

function saveEditor(){
  DIMS.forEach(function(d){
    var n=document.getElementById('edn-'+d.id);
    var ctx=document.getElementById('ectx-'+d.id);
    if(n&&n.value.trim())d.name=n.value.trim();
    if(ctx&&ctx.value.trim())d.context=ctx.value.trim();
    d.opts.forEach(function(_,idx){
      var el=document.getElementById('ef-'+d.id+'-'+idx);
      if(el&&el.value.trim())d.opts[idx]=el.value.trim();
    });
  });
  DIMS.forEach(function(d){SCR[d.id]={};});
  phase=0;curDim=0;render();
}

function render(){
  if(phase===0)renderLanding();
  else if(phase===1)renderQuiz();
  else if(phase===2)renderResults();
  else renderEditor();
}
render();
</script>
</body>
</html>
